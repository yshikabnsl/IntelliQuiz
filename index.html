<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IntelliQuiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>MyQuiz</h1>
    <div id="score">Score: 0</div>
  </header>

  <main>
    <!-- Start screen -->
    <div id="start-screen">
      <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Question card hidden initially -->
    <div id="question-card" style="display:none;">
      <div id="timer">Time left: 30s</div>
      <div id="question"></div>
      <div id="options"></div>
      <div id="result"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
    </div>
  </main>

  <footer>
    <div id="lifelines" style="display:none;">
      <button id="use-lifeline" onclick="showLifelines()">Use Lifeline</button>
      <div id="lifeline-options" style="display:none;">
        <button onclick="useFiftyFifty()">50-50</button>
        <button onclick="useSkip()">Skip</button>
      </div>
    </div>
  </footer>

  <div id="end-screen" style="display:none;">
    <div class="end-card">
      <h2 id="final-score"></h2>
      <button onclick="playAgain()">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
